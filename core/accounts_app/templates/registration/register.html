<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-box {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .body {
            padding: 30px;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
        }

        .btn-main {
            height: 50px;
            border-radius: 12px;
        }

        .password-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: gray;
        }

        .error-box {
            background: #ffe5e5;
            border-radius: 12px;
            padding: 10px;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="card-box">

    <div class="header">
        <h3>Create Account</h3>
        <small>Register new user</small>
    </div>

    <div class="body">

        {% if form.errors %}
            <div class="error-box">
                {% for field in form %}
                    {% for error in field.errors %}
                        <div>{{ error }}</div>
                    {% endfor %}
                {% endfor %}
                {% for error in form.non_field_errors %}
                    <div>{{ error }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3 password-box">
                <input type="password" name="password1" class="form-control" placeholder="Password" required>
            </div>

            <div class="mb-3 password-box">
                <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
            </div>

            <button class="btn btn-success w-100 btn-main" type="submit">
                Register
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'accounts_app:login' %}">Already have account?</a>
        </div>

    </div>

</div>

<script>
    function toggle1() {
        const p = document.getElementById("password1");
        p.type = p.type === "password" ? "text" : "password";
    }

    function toggle2() {
        const p = document.getElementById("password2");
        p.type = p.type === "password" ? "text" : "password";
    }
</script>

</body>
</html>
