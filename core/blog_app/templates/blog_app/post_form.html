<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f7fc;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 700px;
            background: #fff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        form p {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        input[type="text"],
        textarea,
        select,
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #4f46e5;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .checkbox label {
            margin: 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Create New Post</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <p>
            <label>Category</label>
            {{ form.category }}
        </p>

        <p>
            <label>Title</label>
            {{ form.title }}
        </p>

        <p>
            <label>Content</label>
            {{ form.content }}
        </p>

        <p>
            <label>Image</label>
            {{ form.image }}
        </p>

        <div class="checkbox">
            {{ form.status }}
            <label>Status</label>
        </div>

        <button type="submit" class="btn">
            Save Post
        </button>
    </form>
</div>

</body>
</html>
