<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Post</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f7fc;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 40px 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .1);
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: #fee2e2;
            color: #dc2626;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h2 {
            color: #222;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .post-title {
            color: #111;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        .btn-delete {
            background: #dc2626;
            color: #fff;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }

        .btn-cancel {
            background: #e5e7eb;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d1d5db;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🗑️</div>

    <h2>Delete Task</h2>

    <p>
        Are you sure you want to delete
        <span class="post-title">"{{ post }}"</span>?
        <br>
        This action cannot be undone.
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="buttons">
            <a href="{{ post.get_absolute_url }}" class="btn btn-cancel">
                Cancel
            </a>

            <button type="submit" class="btn btn-delete">
                Delete
            </button>
        </div>
    </form>
</div>

</body>
</html>
